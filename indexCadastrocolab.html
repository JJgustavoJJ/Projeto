<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <title>Novo Colaborador</title>

    <style>
        /* Paleta de Cores Personalizada */
        :root {
            --azul-escuro: #1a2a40;
            --laranja: #f37021;
            --cinza-claro: #f8f9fa;
            --cinza-texto: #6c757d;
        }

        body {
            background-color: var(--azul-escuro) !important;
        }

        .card {
            border: none;
            border-top: 5px solid var(--laranja);
        }

        .card-title {
            color: var(--azul-escuro);
            font-weight: bold;
        }

        .form-label {
            color: var(--cinza-texto);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Botão Laranja */
        .btn-primary {
            background-color: var(--laranja) !important;
            border-color: var(--laranja) !important;
            transition: 0.3s;
        }

        .btn-primary:hover {
            filter: brightness(90%);
        }

        /* Estilização dos Inputs */
        .form-control:focus, .form-select:focus {
            border-color: var(--laranja);
            box-shadow: 0 0 0 0.25 racrgba(243, 112, 33, 0.25);
        }

        .input-group-text {
            background-color: var(--cinza-claro);
            color: var(--azul-escuro);
        }

        .bi-person-plus-fill {
            color: var(--laranja);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 900px;">
        <div class="card-body">
            <h4 class="card-title text-center mb-4">
                <i class="bi bi-person-plus-fill me-2"></i>Dados do Novo Colaborador
            </h4>
            
            <form class="row g-3">
                <!-- Linha 1 -->
                <div class="col-md-8">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" placeholder="Ex: João Silva">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control">
                </div>
                
                <!-- Linha 2 -->
                <div class="col-md-4">
                    <label class="form-label">RG</label>
                    <input type="text" class="form-control" placeholder="00.000.000-0">
                </div>
                <div class="col-md-4">
                    <label class="form-label">CPF</label>
                    <input type="text" class="form-control" placeholder="000.000.000-00">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Telefone</label>
                    <input type="tel" class="form-control" placeholder="(00) 00000-0000">
                </div>

                <!-- Linha 3 -->
                <div class="col-md-4">
                    <label class="form-label">E-mail Corporativo</label>
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="usuario">
                        <span class="input-group-text">@reach.com</span>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Departamento</label>
                    <select class="form-select">
                        <option selected disabled>Selecione...</option>
                        <option value="1">RH</option>
                        <option value="2">TI</option>
                        <option value="3">Design</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Cargo</label>
                    <input type="text" class="form-control">
                </div>

                <!-- Linha 4 -->
                <div class="col-md-4">
                    <label class="form-label">Salário</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="number" class="form-control" step="0.01">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data da Admissão</label>
                    <input type="date" class="form-control">
                </div>
                
                <div class="col-md-4">
                    <label class="form-label d-block">Tipo de Contrato</label>
                    <div class="py-2">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contrato" id="clt" value="clt">
                            <label class="form-check-label" for="clt">CLT</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contrato" id="pj" value="pj">
                            <label class="form-check-label" for="pj">PJ</label>
                        </div>
                    </div>
                </div>

                <!-- Botão -->
                <div class="col-12 mt-4 text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5">Registrar Admissão</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
