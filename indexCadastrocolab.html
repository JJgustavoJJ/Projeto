<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Novo Colaborador</title>
</head>

<body class="container bg-primary">
    <div class="card shadow-sm position-absolute top-50 start-50 translate-middle p-5" style="width: 60rem">
        <h5 class="card-title text-center m-3"> <i class="bi bi-person-plus"></i> Dados do Novo Colaborador</h5>
        <form class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nome Completo</label>
                <input type="text" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">CPF</label>
                <input type="text" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Data de Nascimento</label>
                <input type="date" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Telefone</label>
                <input type="text" class="form-control">
            </div>
            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="email corporativo"
                    aria-label="Recipient’s username" aria-describedby="basic-addon2">
                <span class="input-group-text" id="basic-addon2">@reach.com</span>
            </div>
            <div class="col-md-6">
                <label class="mb-2">Departamento</label>
                <select class="form-select" id="specificSizeSelect">
                    <option selected>Selecione...</option>
                    <option value="1">RH</option>
                    <option value="2">TI</option>
                    <option value="3">Design</option>
                    <option value="4">Financeiro</option>
                    <option value="5">Marketing</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Cargo</label>
                <input type="text" class="form-control">
            </div>
            <div class=" col-md-6 mb-3">
                <label class="form-label">Salário</label>
                <div class="input-group">
                    <span class="input-group-text">R$</span>
                    <input type="text" class="form-control">
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label "> Data da Admissão</label>
                <div class="form-lable">
                    <input type="date">
                </div>
                <div class="m-3">
                    <!-- d-block força o label a ocupar a linha inteira em cima -->
                    <label class="form-label d-block mb-2">Tipo de Contrato</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1"
                            value="option1">
                        <label class="form-check-label" for="inlineRadio1">CLT</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2"
                            value="option2">
                        <label class="form-check-label" for="inlineRadio2">PJ</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3"
                            value="option3">
                        <label class="form-check-label" for="inlineRadio3">Estágio</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio4"
                            value="option4">
                        <label class="form-check-label" for="inlineRadio4">Temporário</label>
                    </div>

                    <div class="col-mb-6">
                        <button type="submit" class="btn btn-primary">Registrar Admissão</button>
                    </div>
        </form>
    </div>

</body>

</html>
