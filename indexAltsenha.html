<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Recuperar Senha</title>
</head>

<body class="bg-primary d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg border-0" style="width: 22rem; border-radius: 15px;">
        <div class="card-body p-4 pt-5">
            
            <!-- Avatar/Ícone no topo -->
            <div class="position-absolute top-0 start-50 translate-middle">
                <img src="./img/Captura de tela 2026-03-26 101337.png" 
                     class="rounded-circle border border-4 border-white shadow-sm" 
                     width="90px" height="90px" style="object-fit: cover;">
            </div>

            <h5 class="card-title text-center mt-4 mb-4 fw-bold">Recuperar Senha</h5>

            <form>
                <div class="mb-3">
                    <label class="form-label small text-muted">Nova Senha</label>
                    <input type="password" class="form-control" placeholder="Mínimo 8 caracteres">
                </div>
                
                <div class="mb-4">
                    <label class="form-label small text-muted">Confirmar Nova Senha</label>
                    <input type="password" class="form-control" placeholder="Repita a senha">
                </div>

                <!-- Botão corrigido (sem a tag <a> interna) -->
                <div class="d-grid">
                    <button type="button" onclick="window.location.href='./indexlogin.html'" class="btn btn-warning fw-bold py-2 shadow-sm">
                        <i class="bi bi-check2-square me-2"></i> Alterar Senha
                    </button>
                </div>
        
            </form>
        </div>
    </div>

</body>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.buncle.min.js"></script>
</html>
