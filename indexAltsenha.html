<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Alterar Senha - ReacH</title>

    <style>
        /* Paleta de Cores Personalizada */
        :root {
            --azul-escuro: #1a2a40;
            --laranja: #f37021;
            --cinza-claro: #f8f9fa;
            --cinza-texto: #6c757d;
        }

        body {
            background-color: var(--azul-escuro) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            border: none;
            border-top: 5px solid var(--laranja);
            border-radius: 15px;
            width: 22rem;
            position: relative;
        }

        .card-title {
            color: var(--azul-escuro);
        }

        /* Estilização do Botão Personalizado */
        .btn-alterar {
            background-color: var(--laranja) !important;
            border-color: var(--laranja) !important;
            color: white !important;
            transition: 0.3s;
        }

        .btn-alterar:hover {
            filter: brightness(90%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Foco nos Inputs */
        .form-control:focus {
            border-color: var(--laranja);
            box-shadow: 0 0 0 0.25rem rgba(243, 112, 33, 0.25);
        }

        .img-avatar {
            object-fit: cover;
            background-color: white;
        }
    </style>
</head>

<body>

    <div class="card shadow-lg">
        <div class="card-body p-4 pt-5">
            
            <!-- Avatar/Ícone no topo -->
            <div class="position-absolute top-0 start-50 translate-middle">
                <img src="./img/Captura de tela 2026-03-26 101337.png" 
                     class="rounded-circle border border-4 border-white shadow-sm img-avatar" 
                     width="90" height="90" alt="Logo ReacH">
            </div>

            <h5 class="card-title text-center mt-4 mb-4 fw-bold">Definir Nova Senha</h5>

            <form>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Nova Senha</label>
                    <input type="password" class="form-control" placeholder="Mínimo 8 caracteres">
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Confirmar Nova Senha</label>
                    <input type="password" class="form-control" placeholder="Repita a senha">
                </div>

                <div class="d-grid">
                    <button type="button" onclick="window.location.href='./indexlogin.html'" class="btn btn-alterar fw-bold py-2 shadow-sm">
                        <i class="bi bi-check2-square me-2"></i> Alterar Senha
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
</body>
</html>
