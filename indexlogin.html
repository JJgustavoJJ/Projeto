<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">


    <title>Login ReacH</title>
</head>

<body class="bg-primary d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg border-0" style="width: 24rem; border-radius: 15px;">
        <div class="card-body p-4 pt-5">
            
            <!-- Avatar centralizado no topo -->
            <div class="position-absolute top-0 start-50 translate-middle">
                <img src="./img/Captura de tela 2026-03-26 101337.png" 
                     class="rounded-circle border border-4 border-white shadow-sm" 
                     width="100px" height="100px" style="object-fit: cover;">
            </div>

            <h5 class="card-title text-center my-4 fw-bold">Entrar no ReacH</h5>
            
            <form wire:submit.prevent="login">
                <!-- Campo Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" wire:model='email' class="form-control" placeholder="Seu email corporativo">
                </div>

                <!-- Campo Senha -->
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" wire:model='password' class="form-control" placeholder="Sua senha">
                </div>

                <!-- Opções e Recuperação -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check m-0">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">Lembrar login</label>
                    </div>
                    <a href="./indexRecsenha.html" class="small text-decoration-none text-muted">Esqueceu a senha?</a>
                </div>

                <!-- Botão de Ação -->
                <div class="d-grid">
                    <button class="btn btn-warning fw-bold py-2 shadow-sm" type="submit">
                        <i class="bi bi-box-arrow-right me-2"></i> Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>


    

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.buncle.min.js"></script>

</html>
