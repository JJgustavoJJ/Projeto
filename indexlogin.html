<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">


    <title>Login ReacH</title>
</head>

<body class="container bg-primary" >
    

    <div class="card shadow-sm position-absolute top-50 start-50 translate-middle " style="width: 20rem;">
        <div class="card-body m-5">

        <div class="position-absolute top-0 start-50 translate-middle">
            <img src="./img/Captura de tela 2026-03-26 101337.png" class="rounded-circle border border-4" width="100px">
        </div>

        <h5 class="card-title text-center mb-3">Entrar no ReacH</h5>
            <form wire:submit.prevent="login">

        <div class="mb-3">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" wire:model='email' class="form-control" placeholder="insira seu login...">
            </div>
            <div>
                 <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" wire:model='password' class="form-control" placeholder="insira sua senha...">
            </div>
        </div>


        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="autoSizingCheck2">
            <label class="form-check-label" for="autoSizingCheck2">Lembrar login</label>
        </div>

        <a href="./indexsenha.html">Recuperar Senha</a>

        <button class="btn btn-warning mt-3" type="submit" value="submit"> <i class="bi bi-box-arrow-right"></i> Entrar</button>
        </form>
    </div>

    </div>

    

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.buncle.min.js"></script>

</html>
