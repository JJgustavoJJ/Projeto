<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Login ReacH</title>

    <style>
        /* Paleta de Cores Personalizada */
        :root {
            --azul-escuro: #1a2a40;
            --laranja: #f37021;
            --cinza-claro: #f8f9fa;
            --cinza-texto: #6c757d;
        }

        body {
            background-color: var(--azul-escuro) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            border: none;
            border-top: 5px solid var(--laranja);
            border-radius: 15px;
            width: 24rem;
        }

        .card-title {
            color: var(--azul-escuro);
            font-weight: bold;
        }

        .form-label {
            color: var(--cinza-texto);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Botão Laranja Personalizado */
        .btn-entrar {
            background-color: var(--laranja) !important;
            border-color: var(--laranja) !important;
            color: white !important;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-entrar:hover {
            filter: brightness(90%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Foco nos Inputs */
        .form-control:focus {
            border-color: var(--laranja);
            box-shadow: 0 0 0 0.25 rem rgba(243, 112, 33, 0.25);
        }

        .img-avatar {
            object-fit: cover;
            background-color: white;
        }

          /* Link Esqueceu a Senha */
    .link-forget {
        color: var(--azul-escuro);
        transition: 0.3s;
    }

    .link-forget:hover {
        color: var(--laranja) !important;
    }

    </style>
</head>

<body>

    <div class="card shadow-lg position-relative">
        <div class="card-body p-4 pt-5">
            
            <!-- Avatar centralizado no topo -->
            <div class="position-absolute top-0 start-50 translate-middle">
                <img src="./img/Captura de tela 2026-03-26 101337.png" 
                     class="rounded-circle border border-4 border-white shadow-sm img-avatar" 
                     width="100" height="100" alt="Logo ReacH">
            </div>

            <h5 class="card-title text-center my-4">Entrar no ReacH</h5>
            
            <form wire:submit.prevent="login">
                <!-- Campo Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" wire:model='email' class="form-control" placeholder="Seu email corporativo">
                </div>

                <!-- Campo Senha -->
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" wire:model='password' class="form-control" placeholder="Sua senha">
                </div>

                <!-- Opções e Recuperação -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check m-0">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small text-muted" for="remember">Lembrar login</label>
                    </div>
<a href="./indexRecsenha.html" class="small text-decoration-none link-forget">Esqueceu a senha?</a>                </div>

                <!-- Botão de Ação -->
                <div class="d-grid">
                    <button class="btn btn-entrar py-2 shadow-sm" type="submit">
                        <i class="bi bi-box-arrow-right me-2"></i> Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
</body>

</html>
