<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Recuperar Senha</title>
</head>

<body class="bg-primary d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg border-0" style="width: 22rem; border-radius: 15px;">
        <div class="card-body p-4 pt-5">
            
            <!-- Avatar centralizado no topo -->
            <div class="position-absolute top-0 start-50 translate-middle">
                <img src="./img/Captura de tela 2026-03-26 101337.png" 
                     class="rounded-circle border border-4 border-white shadow-sm" 
                     width="90px" height="90px" style="object-fit: cover;">
            </div>

            <div class="text-center mt-4 mb-4">
                <h5 class="card-title fw-bold mb-1">Recuperar Senha</h5>
                <p class="text-muted small">Enviaremos um link de recuperação para o seu e-mail.</p>
            </div>

            <form wire:submit.prevent="login">
                <div class="mb-4">
                    <label for="email" class="form-label small fw-bold">E-mail Cadastrado</label>
                    <input type="email" id="email" wire:model="email" class="form-control py-2" placeholder="exemplo@reach.com">
                </div>

                <div class="d-grid">
                    <button class="btn btn-warning fw-bold py-2 shadow-sm" onclick="window.location.href='./indexAltsenha.html'" type="button">
                        <i class="bi bi-send-fill me-2"></i> Enviar Link
                    </button>
                </div>
                
            </form>
        </div>
    </div>

</body>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.buncle.min.js"></script>
</html>
