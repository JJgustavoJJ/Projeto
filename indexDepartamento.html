<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <title>Cadastro de Departamento</title>

    <style>
        /* Paleta de Cores Personalizada */
        :root {
            --azul-escuro: #1a2a40;
            --laranja: #f37021;
            --cinza-claro: #f8f9fa;
            --cinza-texto: #6c757d;
        }

        body {
            background-color: var(--azul-escuro) !important;
        }

        .card {
            border: none;
            border-top: 5px solid var(--laranja);
            border-radius: 15px;
        }

        .card-title {
            color: var(--azul-escuro);
            font-weight: bold;
        }

        .form-label {
            color: var(--cinza-texto);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Botão Principal */
        .btn-primary {
            background-color: var(--laranja) !important;
            border-color: var(--laranja) !important;
            transition: 0.3s;
        }

        .btn-primary:hover {
            filter: brightness(90%);
        }

        /* Botão Cancelar */
        .btn-outline-secondary {
            color: var(--cinza-texto);
            border-color: var(--cinza-texto);
        }

        .btn-outline-secondary:hover {
            background-color: var(--cinza-texto);
            color: white;
        }

        /* Estilização da Caixa de Texto Esticável */
        textarea.form-control {
            resize: vertical;
            /* Permite esticar apenas para baixo para não quebrar o layout */
            min-height: 120px;
        }

        /* Foco nos Campos */
        .form-control:focus {
            border-color: var(--laranja);
            box-shadow: 0 0 0 0.25rem rgba(243, 112, 33, 0.25);
        }

        .bi-building-add {
            color: var(--laranja);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 800px;">
        <div class="card-body">
            <h4 class="card-title text-center mb-4">
                <i class="bi bi-building-add me-2"></i>Novo Departamento
            </h4>

            <form class="row g-3">
                <div class="col-md-7">
                    <label class="form-label">Nome do Departamento</label>
                    <input type="text" class="form-control" placeholder="Ex: Marketing">
                </div>
                <div class="col-md-5">
                    <label class="form-label">Gestor Responsável</label>
                    <input type="text" class="form-control" placeholder="Nome do Gestor">
                </div>

                <div class="col-12">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control"
                        placeholder="Descreva as responsabilidades e objetivos do departamento..."></textarea>
                </div>

                <!-- Botões Alinhados à Direita -->
                <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                    <button type="reset" class="btn btn-outline-secondary px-4">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save2"></i> Salvar
                    </button>

                </div>
            </form>
        </div>
    </div>

    <script src="https://jsdelivr.net"></script>
</body>

</html>
